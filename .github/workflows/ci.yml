# Trunk-style flow: quality gates run on every PR and on pushes to main/develop.
# Vercel preview (PRs) and production (main) deploy only after the same commit passes `quality`.
#
# Monorepo: move to repo root `.github/workflows/`, add `paths: [ 'corp-site/**' ]`,
# `defaults.run.working-directory: corp-site`, and set `working-directory` on vercel-action if needed.

name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: cicd-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

env:
  DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/ci?schema=public

jobs:
  quality:
    name: Lint, types & build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Prisma — validate schema
        run: npx prisma validate

      - name: Prisma — generate client
        run: npx prisma generate

      - name: ESLint
        run: npm run lint

      - name: TypeScript
        run: npm run typecheck

      - name: Next.js production build
        run: npm run build

  deploy-preview:
    name: Vercel preview
    needs: quality
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy preview
        uses: amondnet/vercel-action@v42.1.0
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          github-comment: true

  deploy-production:
    name: Vercel production
    needs: quality
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy production
        uses: amondnet/vercel-action@v42.1.0
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: "--prod"
          github-comment: false
